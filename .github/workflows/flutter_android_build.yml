name: Flutter Android Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: Prepare release files
        run: mkdir -p release && cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release/lingyun-time-${GITHUB_REF_NAME}-arm64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lingyun-time-release-arm64-apk
          path: release/lingyun-time-${{ github.ref_name }}-arm64.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: 凌云时光 ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/lingyun-time-${{ github.ref_name }}-arm64.apk
